<div class="wrapper">

<script>
  emailjs.init('GNxyiAeJ7fOzThuGt');
  let SHEET_ID = '1hv-KwIXk92vwlUJC08iZWFMznsRQGlMrgdvYii07VfY';
  let currentEmail = ''; // email এখানে store হবে

  function toggleSettings() {
    const body  = document.getElementById('settingsBody');
    const arrow = document.getElementById('settingsArrow');
    const open  = body.style.display === 'block';
    body.style.display = open ? 'none' : 'block';
    arrow.textContent  = open ? '▼' : '▲';
  }

  function applySheet() {
    const input = document.getElementById('sheetInput').value.trim();
    if (!input) { alert('Sheet link বা ID দিন।'); return; }
    const match = input.match(/\/d\/([a-zA-Z0-9-_]+)/);
    SHEET_ID = match ? match[1] : input;
    document.getElementById('settingsBody').style.display = 'none';
    document.getElementById('settingsArrow').textContent  = '▼';
    loadCourses();
    alert('✔ Sheet সংযুক্ত হয়েছে!');
  }

async function loadCourses() {
  try {
    const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47).slice(0, -2));
    
    // সব data global এ রাখো
    window.allRows = json.table.rows;

    const courses = [...new Set(
      window.allRows.map(r => r.c[3]?.v?.toString().trim()).filter(Boolean)
    )];

    const select = document.getElementById('courseName');
    select.innerHTML = '<option value="">-- কোর্স সিলেক্ট করুন --</option>';
    courses.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      select.appendChild(opt);
    });

    // Batch reset
    document.getElementById('batchNumber').innerHTML = 
      '<option value="">-- আগে কোর্স সিলেক্ট করুন --</option>';

  } catch (err) {
    console.error('Course load error:', err);
  }
}

  window.addEventListener('load', loadCourses);

function loadBatches() {
  const selectedCourse = document.getElementById('courseName').value;
  const batchSelect    = document.getElementById('batchNumber');

  if (!selectedCourse) {
    batchSelect.innerHTML = '<option value="">-- আগে কোর্স সিলেক্ট করুন --</option>';
    return;
  }

  // সেই course এর unique batch গুলো বের করো
  const batches = [...new Set(
    window.allRows
      .filter(r => r.c[3]?.v?.toString().trim() === selectedCourse)
      .map(r => r.c[4]?.v?.toString().trim())
      .filter(Boolean)
  )].sort((a, b) => Number(a) - Number(b));

  batchSelect.innerHTML = '<option value="">-- ব্যাচ সিলেক্ট করুন --</option>';
  batches.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = `Batch ${b}`;
    batchSelect.appendChild(opt);
  });
}

  function getGrade(mark) {
    if (mark >= 80) return { label: 'A+', cls: 'grade-ap' };
    if (mark >= 70) return { label: 'A',  cls: 'grade-a'  };
    if (mark >= 60) return { label: 'B',  cls: 'grade-b'  };
    if (mark >= 50) return { label: 'C',  cls: 'grade-c'  };
    if (mark >= 40) return { label: 'D',  cls: 'grade-d'  };
    return               { label: 'F',  cls: 'grade-f'  };
  }

  async function fetchResult() {
    const studentId  = document.getElementById('studentId').value.trim();
    const courseName = document.getElementById('courseName').value;
    const batchNo = document.getElementById('batchNumber').value;

    if (!studentId || !courseName || !batchNo) {
      showError('অনুগ্রহ করে সব তথ্য পূরণ করুন।');
      return;
    }

    hide('resultCard');
    hide('errorBox');
    show('loading');

    try {
      const url  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
      const res  = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47).slice(0, -2));
      const rows = json.table.rows;
      const cols = json.table.cols;

      let found = null;
      for (const row of rows) {
        const id     = row.c[0]?.v?.toString().trim();
        const course = row.c[3]?.v?.toString().trim().toLowerCase();
        const batch  = row.c[4]?.v?.toString().trim();

        if (
          id     === studentId &&
          course === courseName.toLowerCase() &&
          (batch === batchNo || batch === Number(batchNo).toString())
        ) {
          found = row;
          break;
        }
      }

      hide('loading');

      if (!found) {
        showError('❌ তথ্য পাওয়া যায়নি। ID, কোর্স এবং ব্যাচ নম্বর সঠিক কিনা যাচাই করুন।');
        return;
      }

      const nameEn  = found.c[1]?.v || '';
      currentEmail  = found.c[2]?.v || ''; // global variable এ save
      const course  = found.c[3]?.v || '';
      const batch   = found.c[4]?.v || '';

      const subjects = [];
      for (let i = 5; i < cols.length; i++) {
        const subName = cols[i].label;
        const mark    = found.c[i]?.v ?? null;
        if (subName && mark !== null) {
          subjects.push({ name: subName, mark: Number(mark) });
        }
      }

      const total  = subjects.reduce((s, x) => s + x.mark, 0);
      const avg    = subjects.length ? (total / subjects.length).toFixed(1) : 0;
      const overall = getGrade(Number(avg));
      const passed  = subjects.every(s => s.mark >= 40);

      const subjectRows = subjects.map(s => {
        const g   = getGrade(s.mark);
        const cls = s.mark >= 40 ? 'pass' : 'fail';
        return `
          <div class="subject-row ${cls}">
            <span class="subject-name">${s.name}</span>
            <div class="subject-right">
              <span class="subject-mark">${s.mark}</span>
              <span class="subject-grade ${g.cls}">${g.label}</span>
            </div>
          </div>`;
      }).join('');

      document.getElementById('resultCard').innerHTML = `
        <div class="result-header">
          <h2>🎓 পরীক্ষার ফলাফল</h2> 
          <div class="student-name-en">${nameEn}</div>
          <!--<div class="student-name">${nameEn}</div>-->
          <div class="student-meta">ID: ${studentId} &nbsp;|&nbsp; Batch: ${batch}</div>
          <div class="student-meta">${course}</div>
          <span class="final-badge ${passed ? 'badge-pass' : 'badge-fail'}">
            ${passed ? '✔ উত্তীর্ণ' : '✘ অনুত্তীর্ণ'}
          </span>
        </div>

        <div class="summary">
          <div class="summary-item">
            <div class="summary-value">${total}</div>
            <div class="summary-label">মোট নম্বর</div>
          </div>
          <div class="summary-item">
            <div class="summary-value">${avg}%</div>
            <div class="summary-label">গড়</div>
          </div>
          <div class="summary-item">
            <div class="summary-value">${overall.label}</div>
            <div class="summary-label">গ্রেড</div>
          </div>
        </div>

        <div class="subject-list">
          <div class="subject-title">বিষয়ভিত্তিক ফলাফল</div>
          ${subjectRows}
        </div>

        <button class="btn-download" onclick="downloadPDF()">
          ⬇ PDF ডাউনলোড করুন
        </button>
      `;

      show('resultCard');
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });

    } catch (err) {
      hide('loading');
      showError('সংযোগে সমস্যা হয়েছে। আবার চেষ্টা করুন।');
      console.error(err);
    }
  }

  async function sendEmail() {
    const btn = document.getElementById('emailBtn');
    btn.textContent = '⏳ পাঠানো হচ্ছে...';
    btn.disabled = true;

    try {
      const nameEnEl   = document.querySelector('.student-name-en');
      const metaEls    = document.querySelectorAll('.student-meta');
      const allVals    = document.querySelectorAll('.summary-value');
      const badgeEl    = document.querySelector('.final-badge');

      const candidateName = nameEnEl?.textContent  || '';
      const idBatch       = metaEls[0]?.textContent || '';
      const courseName    = metaEls[1]?.textContent || '';
      const totalMarks    = allVals[0]?.textContent || '';
      const average       = allVals[1]?.textContent || '';
      const grade         = allVals[2]?.textContent || '';
      const resultStatus  = badgeEl?.textContent    || '';

      if (!currentEmail) {
        alert('Email address পাওয়া যায়নি।');
        btn.textContent = '📧 Email পাঠান';
        btn.disabled = false;
        return;
      }

      await emailjs.send('service_hi00o4j', 'template_2p7tmqu', {
        candidate_name : candidateName,
        course_name    : courseName,
        batch_no       : idBatch,
        total_marks    : totalMarks,
        average        : average,
        grade          : grade,
        result_status  : resultStatus,
        to_email       : currentEmail,
      });

      btn.textContent = '✔ Email পাঠানো হয়েছে!';
      btn.style.background = 'linear-gradient(135deg, #4ade80, #16a34a)';

    } catch (err) {
      alert('Email পাঠাতে সমস্যা হয়েছে।');
      btn.textContent = '📧 Email পাঠান';
      btn.disabled = false;
      console.error(err);
    }
  }

  function downloadPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const gold  = [226, 185, 111];
    const dark  = [26,  26,  46];
    const green = [74,  222, 128];
    const red   = [248, 113, 113];
    const white = [255, 255, 255];
    const gray  = [180, 180, 180];

    const pageW = doc.internal.pageSize.getWidth();

    doc.setFillColor(...dark);
    doc.rect(0, 0, pageW, 45, 'F');

    doc.setFontSize(20);
    doc.setTextColor(...gold);
    doc.setFont('helvetica', 'bold');
    doc.text('BIM Result Portal', pageW / 2, 18, { align: 'center' });

    doc.setFontSize(10);
    doc.setTextColor(...gray);
    doc.setFont('helvetica', 'normal');
    doc.text('Bangladesh Institute of Management', pageW / 2, 27, { align: 'center' });
    doc.text('Special Foundation Training', pageW / 2, 34, { align: 'center' });

    const allVals  = document.getElementById('resultCard').querySelectorAll('.summary-value');
    const badgeEl  = document.getElementById('resultCard').querySelector('.final-badge');
    const metaEls  = document.getElementById('resultCard').querySelectorAll('.student-meta');
    const nameEnEl = document.querySelector('.student-name-en');

    const nameEnTxt = nameEnEl?.textContent || '';
    const idBatch   = metaEls[0]?.textContent || '';
    const course    = metaEls[1]?.textContent || '';
    const badge     = badgeEl?.textContent    || '';
    const total     = allVals[0]?.textContent || '';
    const avg       = allVals[1]?.textContent || '';
    const grade     = allVals[2]?.textContent || '';
    const passed    = !badge.includes('অনু');

    doc.setFillColor(240, 240, 250);
    doc.roundedRect(14, 52, pageW - 28, 32, 3, 3, 'F');

    doc.setFontSize(13);
    doc.setTextColor(...dark);
    doc.setFont('helvetica', 'bold');
    doc.text(nameEnTxt, 20, 61);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(80, 80, 80);
    doc.text(idBatch, 20, 69);
    doc.text(course,  20, 76);

    doc.setFillColor(...(passed ? green : red));
    doc.roundedRect(pageW - 55, 54, 40, 12, 3, 3, 'F');
    doc.setTextColor(...white);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text(passed ? 'PASSED' : 'FAILED', pageW - 35, 62, { align: 'center' });

    const boxes = [
      { label: 'Total Marks', value: total },
      { label: 'Average',     value: avg   },
      { label: 'Grade',       value: grade },
    ];

    boxes.forEach((b, i) => {
      const x = 14 + i * 62;
      doc.setFillColor(...dark);
      doc.roundedRect(x, 92, 56, 22, 3, 3, 'F');
      doc.setTextColor(...gold);
      doc.setFontSize(14);
      doc.setFont('helvetica', 'bold');
      doc.text(b.value, x + 28, 104, { align: 'center' });
      doc.setFontSize(8);
      doc.setTextColor(...gray);
      doc.setFont('helvetica', 'normal');
      doc.text(b.label, x + 28, 111, { align: 'center' });
    });

    const rows = document.getElementById('resultCard').querySelectorAll('.subject-row');
    const tableData = [];
    rows.forEach((row, idx) => {
      const subName = row.querySelector('.subject-name')?.textContent || '';
      const mark    = row.querySelector('.subject-mark')?.textContent || '';
      const grd     = row.querySelector('.subject-grade')?.textContent || '';
      const status  = row.classList.contains('pass') ? 'Pass' : 'Fail';
      tableData.push([idx + 1, subName, mark, grd, status]);
    });

    doc.autoTable({
      startY: 122,
      head: [['#', 'Subject', 'Marks', 'Grade', 'Status']],
      body: tableData,
      theme: 'grid',
      headStyles: { fillColor: dark, textColor: gold, fontStyle: 'bold', halign: 'center' },
      bodyStyles: { textColor: [40, 40, 40], halign: 'center' },
      columnStyles: { 1: { halign: 'left' } },
      alternateRowStyles: { fillColor: [245, 245, 255] },
      didParseCell: (data) => {
        if (data.section === 'body' && data.column.index === 4) {
          data.cell.styles.textColor = data.cell.raw === 'Pass' ? [22, 163, 74] : [220, 38, 38];
          data.cell.styles.fontStyle = 'bold';
        }
      },
    });

    const finalY = doc.lastAutoTable.finalY + 12;
    doc.setFontSize(9);
    doc.setTextColor(...gray);
    doc.text(
      'Generated by BIM Result Portal  |  ' + new Date().toLocaleDateString('en-BD'),
      pageW / 2, finalY, { align: 'center' }
    );

    doc.save(`${nameEnTxt}'s_Result.pdf`);
  }

  function show(id) { document.getElementById(id).style.display = 'block'; }
  function hide(id) { document.getElementById(id).style.display = 'none';  }

  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
